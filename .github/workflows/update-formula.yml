name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update formula
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          SHA_DARWIN_ARM64="${{ github.event.client_payload.sha_darwin_arm64 }}"
          SHA_DARWIN_X64="${{ github.event.client_payload.sha_darwin_x64 }}"
          SHA_LINUX_ARM64="${{ github.event.client_payload.sha_linux_arm64 }}"
          SHA_LINUX_X64="${{ github.event.client_payload.sha_linux_x64 }}"

          cat > Formula/lpm.rb << EOF
          class Lpm < Formula
            desc "Fast package manager for lpm.dev — written in Rust"
            homepage "https://lpm.dev"
            license "MIT"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/lpm-dev/rust-client/releases/download/v${VERSION}/lpm-darwin-arm64"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "https://github.com/lpm-dev/rust-client/releases/download/v${VERSION}/lpm-darwin-x64"
                sha256 "${SHA_DARWIN_X64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/lpm-dev/rust-client/releases/download/v${VERSION}/lpm-linux-arm64"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "https://github.com/lpm-dev/rust-client/releases/download/v${VERSION}/lpm-linux-x64"
                sha256 "${SHA_LINUX_X64}"
              end
            end

            def install
              binary = Dir.glob("lpm-*").first
              bin.install binary => "lpm"
            end

            test do
              assert_match "lpm-rs", shell_output("#{bin}/lpm --version 2>&1", 0)
            end
          end
          EOF

          # Fix indentation (heredoc adds leading spaces)
          sed -i 's/^          //' Formula/lpm.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/lpm.rb
          git commit -m "Update lpm to ${{ github.event.client_payload.version }}"
          git push
